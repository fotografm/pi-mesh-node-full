<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>raspi20 — Notes</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg:           #080818;
    --panel:        #0d0d20;
    --input-bg:     #0a0a1e;
    --border:       #4a4a8a;
    --border-dim:   #2a2a5a;
    --border-focus: #9999dd;
    --text:         #f0f0ff;
    --heading:      #8888cc;
    --muted:        #aaaadd;
    --dim:          #7878aa;
    --green-bright: #66dd66;
    --red:          #ff6666;
    --red-border:   #cc3333;
    --btn-bg:       #0f0f28;
    --btn-border:   #4a4a9a;
    --btn-border-h: #8888cc;
    --btn-bg-h:     #1a1a3a;
    --btn-label:    #ccccff;
    --mark-bg:      #3a3a00;
    --mark-fg:      #ffff66;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: monospace;
    font-size: 14px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

/* ── Title bar ───────────────────────────────────────────────────────────── */
#titlebar {
    height: 52px;
    flex-shrink: 0;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
}
#titlebar h1 {
    font-size: 13px;
    font-weight: normal;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--heading);
    white-space: nowrap;
    flex-shrink: 0;
}
#search-wrap {
    position: relative;
    width: 220px;
    flex-shrink: 0;
}
#search {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: monospace;
    font-size: 13px;
    padding: 6px 26px 6px 10px;
    outline: none;
    transition: border-color 0.15s;
}
#search:focus { border-color: var(--border-focus); }
#search::placeholder { color: var(--dim); }
#search-clear {
    position: absolute;
    right: 6px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 13px; line-height: 1;
    display: none; padding: 0;
}
#search-clear.visible { display: block; }
#search-clear:hover { color: var(--text); }
#match-count {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    min-width: 60px;
}
#titlebar-spacer { flex: 1; }
#save-status {
    font-size: 11px;
    letter-spacing: 1px;
    white-space: nowrap;
    min-width: 60px;
    text-align: right;
    color: var(--green-bright);
}
#new-btn {
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    border-radius: 4px;
    color: var(--btn-label);
    font-family: monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 7px 16px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
}
#new-btn:hover { background: var(--btn-bg-h); border-color: var(--btn-border-h); }

/* ── Layout ──────────────────────────────────────────────────────────────── */
#layout {
    flex: 1;
    display: flex;
    overflow: hidden;
}

/* ── Notes sidebar ───────────────────────────────────────────────────────── */
#notes-list {
    width: 250px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--panel);
}
#notes-list::-webkit-scrollbar { width: 5px; }
#notes-list::-webkit-scrollbar-track { background: var(--bg); }
#notes-list::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 3px; }

.note-item {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border-dim);
    cursor: pointer;
    transition: background 0.1s;
}
.note-item:hover  { background: #121230; }
.note-item.active { background: #1a1a38; border-left: 3px solid var(--btn-border-h); }
.note-item.hidden { display: none; }
.note-item-title {
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
}
.note-item.active .note-item-title { color: #ffffff; }
.note-item-preview {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.note-item-time {
    font-size: 11px;
    color: var(--dim);
    margin-top: 4px;
}
.note-item.active .note-item-time { color: var(--muted); }

mark {
    background: var(--mark-bg);
    color: var(--mark-fg);
    border-radius: 2px;
    padding: 0 1px;
}

/* ── Editor ──────────────────────────────────────────────────────────────── */
#editor-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg);
}
#editor-toolbar {
    display: none;
    align-items: center;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border-dim);
    flex-shrink: 0;
    gap: 12px;
}
#note-title-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: monospace;
    font-size: 15px;
    letter-spacing: 1px;
    min-width: 0;
}
#note-title-input::placeholder { color: var(--dim); }
#note-title-input:focus { color: #ffffff; }

#delete-btn {
    background: none;
    border: 1px solid var(--red-border);
    border-radius: 3px;
    color: var(--red);
    font-family: monospace;
    font-size: 12px;
    padding: 4px 12px;
    cursor: pointer;
    letter-spacing: 1px;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
}
#delete-btn:hover { border-color: #ff4444; color: #ff9999; background: #1a0808; }
#delete-btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }

#note-content-input {
    display: none;
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: monospace;
    font-size: 14px;
    line-height: 1.8;
    padding: 18px;
    resize: none;
}
#note-content-input::placeholder { color: var(--dim); }
#note-content-input:focus { color: #ffffff; }

#no-note {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dim);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
}

/* ── Mobile ──────────────────────────────────────────────────────────────── */
#back-btn { display: none; }
@media (max-width: 520px) {
    body { font-size: 13px; }
    #notes-list { width: 100%; border-right: none; }
    #editor-pane { display: none; position: fixed; inset: 0; z-index: 10; background: var(--bg); }
    #editor-pane.mobile-open { display: flex; }
    #back-btn { display: inline-block; }
    #search-wrap { width: 140px; }
}
#back-btn {
    background: none;
    border: 1px solid var(--border-dim);
    border-radius: 3px;
    color: var(--muted);
    font-family: monospace;
    font-size: 12px;
    padding: 4px 10px;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.15s;
}
#back-btn:hover { border-color: var(--border); color: var(--text); }
</style>
</head>
<body>

<div id="titlebar">
    <h1>raspi20 — Notes</h1>
    <div id="search-wrap">
        <input id="search" type="text" placeholder="Search…"
               oninput="onSearch(this.value)" autocomplete="off" spellcheck="false">
        <button id="search-clear" onclick="clearSearch()" title="Clear">✕</button>
    </div>
    <span id="match-count"></span>
    <span id="titlebar-spacer"></span>
    <span id="save-status"></span>
    <button id="new-btn" onclick="newNote()">+ New</button>
</div>

<div id="layout">
    <div id="notes-list"></div>
    <div id="editor-pane">
        <div id="editor-toolbar">
            <button id="back-btn" onclick="mobileBack()">&#8592; Back</button>
            <input id="note-title-input" type="text" placeholder="Title…" spellcheck="false">
            <button id="delete-btn" disabled>Delete</button>
        </div>
        <textarea id="note-content-input" placeholder="Start typing…" spellcheck="false"></textarea>
        <div id="no-note">Select a note or create a new one</div>
    </div>
</div>

<script>
'use strict';

let notes       = [];
let activeId    = null;
let saveTimer   = null;
let searchQuery = '';

const notesList    = document.getElementById('notes-list');
const saveStatus   = document.getElementById('save-status');
const matchCount   = document.getElementById('match-count');
const searchEl     = document.getElementById('search');
const clearBtn     = document.getElementById('search-clear');
const noNote       = document.getElementById('no-note');
const toolbar      = document.getElementById('editor-toolbar');
const titleInput   = document.getElementById('note-title-input');
const contentInput = document.getElementById('note-content-input');
const deleteBtn    = document.getElementById('delete-btn');
const editorPane   = document.getElementById('editor-pane');

function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtTime(ts) {
    const d = new Date(ts * 1000);
    return d.toLocaleDateString([], {day:'2-digit', month:'short'})
        + ' ' + d.toTimeString().slice(0,5);
}
function preview(content) {
    return (content || '').replace(/\n/g,' ').trim().slice(0,55);
}
function hl(text, query) {
    const escaped = escHtml(text || '');
    if (!query) return escaped;
    const safe = escHtml(query).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    return escaped.replace(new RegExp('('+safe+')','gi'), '<mark>$1</mark>');
}

function renderList() {
    notesList.innerHTML = '';
    const q      = searchQuery.toLowerCase();
    const sorted = [...notes].sort((a,b) => b.ts - a.ts);
    let   visible = 0;

    sorted.forEach(n => {
        const inTitle   = q && (n.title   || '').toLowerCase().includes(q);
        const inContent = q && (n.content || '').toLowerCase().includes(q);
        const show      = !q || inTitle || inContent;

        const div = document.createElement('div');
        div.className = 'note-item'
            + (n.id === activeId ? ' active' : '')
            + (show ? '' : ' hidden');
        div.dataset.id = n.id;
        div.innerHTML = `
            <div class="note-item-title">${hl(n.title || 'Untitled', q)}</div>
            <div class="note-item-preview">${hl(preview(n.content), q)}</div>
            <div class="note-item-time">${fmtTime(n.ts)}</div>`;
        div.addEventListener('click', () => openNote(n.id));
        notesList.appendChild(div);
        if (show) visible++;
    });

    matchCount.textContent = q
        ? (visible + ' match' + (visible !== 1 ? 'es' : ''))
        : (notes.length ? notes.length + ' note' + (notes.length !== 1 ? 's' : '') : '');
}

function onSearch(val) {
    searchQuery = val.trim();
    clearBtn.classList.toggle('visible', searchQuery.length > 0);
    renderList();
}
function clearSearch() {
    searchEl.value = '';
    searchQuery    = '';
    clearBtn.classList.remove('visible');
    renderList();
    searchEl.focus();
}

function openNote(id) {
    activeId = id;
    const n  = notes.find(x => x.id === id);
    if (!n) return;
    noNote.style.display       = 'none';
    toolbar.style.display      = 'flex';
    contentInput.style.display = 'block';
    titleInput.value           = n.title   || '';
    contentInput.value         = n.content || '';
    deleteBtn.disabled         = false;
    editorPane.classList.add('mobile-open');
    renderList();
}

function mobileBack() {
    editorPane.classList.remove('mobile-open');
}

function onEdit() {
    if (!activeId) return;
    saveStatus.textContent = 'unsaved…';
    saveStatus.style.color = '#bbbb44';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveActive, 1200);
}
titleInput.addEventListener('input', onEdit);
contentInput.addEventListener('input', onEdit);

function saveActive() {
    if (!activeId) return;
    const n = notes.find(x => x.id === activeId);
    if (!n) return;
    n.title   = titleInput.value;
    n.content = contentInput.value;
    n.ts      = Date.now() / 1000;
    fetch('/api/notes/' + activeId, {
        method:  'PUT',
        headers: {'Content-Type':'application/json'},
        body:    JSON.stringify({title: n.title, content: n.content}),
    }).then(() => {
        saveStatus.textContent = 'saved \u2713';
        saveStatus.style.color = '#66dd66';
        renderList();
    }).catch(() => {
        saveStatus.textContent = 'error';
        saveStatus.style.color = '#ff6666';
    });
}

function newNote() {
    clearSearch();
    fetch('/api/notes', {
        method:  'POST',
        headers: {'Content-Type':'application/json'},
        body:    JSON.stringify({title:'', content:''}),
    })
    .then(r => r.json())
    .then(n => {
        notes.push(n);
        renderList();
        openNote(n.id);
        titleInput.focus();
    });
}

deleteBtn.addEventListener('click', () => {
    if (!activeId || !confirm('Delete this note?')) return;
    const id = activeId;
    fetch('/api/notes/' + id, {method:'DELETE'}).then(() => {
        notes    = notes.filter(n => n.id !== id);
        activeId = null;
        toolbar.style.display      = 'none';
        contentInput.style.display = 'none';
        noNote.style.display       = 'flex';
        editorPane.classList.remove('mobile-open');
        renderList();
        if (notes.length > 0) {
            openNote([...notes].sort((a,b) => b.ts - a.ts)[0].id);
        }
    });
});

fetch('/api/notes')
    .then(r => r.json())
    .then(data => {
        notes = data;
        renderList();
        if (notes.length > 0) {
            openNote([...notes].sort((a,b) => b.ts - a.ts)[0].id);
        }
    })
    .catch(() => {});
</script>
</body>
</html>
